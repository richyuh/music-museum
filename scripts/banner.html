<!DOCTYPE html>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; width: 1500px; height: 500px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
  .grid {
    display: grid;
    grid-template-columns: repeat(10, 150px);
    grid-template-rows: repeat(4, 125px);
    gap: 0;
    opacity: 0.55;
  }
  .grid img {
    width: 150px;
    height: 125px;
    object-fit: cover;
    display: block;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.7) 100%);
  }
  .text {
    text-align: center;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .text h1 {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -2px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
  }
  .text p {
    font-size: 20px;
    font-weight: 300;
    margin-top: 8px;
    color: rgba(255,255,255,0.8);
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 1px 10px rgba(0,0,0,0.8);
  }
</style>
</head>
