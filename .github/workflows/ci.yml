name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: file:./test.db
  AUTH_SECRET: ci-test-secret

jobs:
  lint-typecheck-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: DB migration test
        run: npx prisma db push --accept-data-loss

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: ${{ !cancelled() && needs.lint-typecheck-test.result == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm install

      - name: Check if Playwright is installed
        id: playwright-check
        run: |
          if node -e "require.resolve('@playwright/test')" 2>/dev/null; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Prisma client
        if: steps.playwright-check.outputs.installed == 'true'
        run: npx prisma generate

      - name: Push DB schema
        if: steps.playwright-check.outputs.installed == 'true'
        run: npx prisma db push

      - name: Seed database
        if: steps.playwright-check.outputs.installed == 'true'
        run: npx prisma db seed

      - name: Install Playwright browsers
        if: steps.playwright-check.outputs.installed == 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright tests
        if: steps.playwright-check.outputs.installed == 'true'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: steps.playwright-check.outputs.installed == 'true' && failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Skip notice
        if: steps.playwright-check.outputs.installed == 'false'
        run: echo "Playwright is not installed — skipping E2E tests"
